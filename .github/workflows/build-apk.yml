name: Build and Release APK

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Download gradle-wrapper.jar
      run: |
        mkdir -p app/gradle/wrapper
        curl -L -o app/gradle/wrapper/gradle-wrapper.jar https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/8.5/gradle-wrapper-8.5.jar

    - name: Create gradlew scripts
      run: |
        cat > app/gradlew << 'EOF'
        #!/bin/sh
        # 复制上面提供的 gradlew 完整内容
        EOF
        cat > app/gradlew.bat << 'EOF'
        @rem 复制上面提供的 gradlew.bat 完整内容
        EOF
        chmod +x app/gradlew

    - name: Build APK
      run: |
        cd app
        ./gradlew assembleRelease

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: iptv-player-apk
        path: app/app/build/outputs/apk/release/*.apk
        retention-days: 7

    - name: Create Release
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "v1.0.${{ github.run_number }}"
        name: "IPTV Player v1.0.${{ github.run_number }}"
        body: "自动构建的 IPTV 播放器 APK，节目单已打包在内。"
        files: app/app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
