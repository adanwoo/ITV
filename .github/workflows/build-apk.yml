name: Build Android APK (Auto-Generate Project)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Create Android project structure
        run: |
          mkdir -p android/app/src/main/java/com/iptv/player
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/assets
          mkdir -p android/gradle/wrapper

      - name: Write build.gradle (Project)
        run: |
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF

      - name: Write settings.gradle
        run: |
          cat > android/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "IPTVPlayer"
          include ':app'
          EOF

      - name: Write gradle.properties
        run: |
          cat > android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Write gradle wrapper properties
        run: |
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dist
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dist
          EOF

      - name: Download gradle-wrapper.jar
        run: |
          curl -L -o android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar

      - name: Write app/build.gradle
        run: |
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'kotlin-android'
          }
          android {
              namespace 'com.iptv.player'
              compileSdk 34
              defaultConfig {
                  applicationId "com.iptv.player"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  // 播放源 URL（可修改）
                  buildConfigField "String", "PLAYLIST_URL", "\"https://itv.19860519.xyz/output/tv.txt\""
              }
              buildTypes {
                  debug {
                      debuggable true
                  }
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions {
                  jvmTarget = '1.8'
              }
              buildFeatures {
                  viewBinding true
              }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
              implementation 'com.google.android.exoplayer:exoplayer-hls:2.19.1'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
          }
          EOF

      - name: Write proguard-rules.pro
        run: touch android/app/proguard-rules.pro

      - name: Write AndroidManifest.xml
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-feature android:name="android.software.leanback" android:required="false" />
              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher"
                  android:label="@string/app_name"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.IPTVPlayer"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Write MainActivity.kt
        run: |
          cat > android/app/src/main/java/com/iptv/player/MainActivity.kt << 'EOF'
          package com.iptv.player
          import android.os.Bundle
          import android.view.GestureDetector
          import android.view.MotionEvent
          import android.view.View
          import android.widget.TextView
          import androidx.appcompat.app.AppCompatActivity
          import androidx.lifecycle.lifecycleScope
          import androidx.recyclerview.widget.LinearLayoutManager
          import com.google.android.exoplayer2.ExoPlayer
          import com.google.android.exoplayer2.MediaItem
          import com.google.android.exoplayer2.PlaybackException
          import com.google.android.exoplayer2.Player
          import com.iptv.player.databinding.ActivityMainBinding
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.launch
          import kotlinx.coroutines.withContext
          
          class MainActivity : AppCompatActivity() {
              private lateinit var binding: ActivityMainBinding
              private lateinit var player: ExoPlayer
              private var channels = listOf<Channel>()
              private var currentChannelIndex = 0
              private var channelAdapter: ChannelAdapter? = null
              private var gestureDetector: GestureDetector? = null
              private var isChannelListVisible = false
          
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityMainBinding.inflate(layoutInflater)
                  setContentView(binding.root)
                  window.decorView.systemUiVisibility = (
                      View.SYSTEM_UI_FLAG_LAYOUT_STABLE or
                      View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION or
                      View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN or
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION or
                      View.SYSTEM_UI_FLAG_FULLSCREEN or
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                  )
                  initPlayer()
                  setupGesture()
                  loadPlaylist()
              }
          
              private fun initPlayer() {
                  player = ExoPlayer.Builder(this).build()
                  binding.playerView.player = player
                  player.addListener(object : Player.Listener {
                      override fun onPlaybackStateChanged(playbackState: Int) {
                          if (playbackState == Player.STATE_ENDED) nextChannel()
                      }
                      override fun onPlayerError(error: PlaybackException) {
                          nextChannel()
                      }
                  })
              }
          
              private fun setupGesture() {
                  gestureDetector = GestureDetector(this, object : GestureDetector.SimpleOnGestureListener() {
                      override fun onSingleTapConfirmed(e: MotionEvent): Boolean {
                          toggleChannelList()
                          return true
                      }
                      override fun onScroll(e1: MotionEvent?, e2: MotionEvent, dx: Float, dy: Float): Boolean {
                          if (e1 != null && kotlin.math.abs(e2.y - e1.y) > 100) {
                              if (e2.y > e1.y) nextChannel() else previousChannel()
                              return true
                          }
                          return false
                      }
                  })
                  binding.root.setOnTouchListener { _, event -> gestureDetector?.onTouchEvent(event) ?: false }
              }
          
              private fun toggleChannelList() {
                  if (isChannelListVisible) hideChannelList() else showChannelList()
              }
          
              private fun showChannelList() {
                  if (channels.isEmpty()) return
                  if (channelAdapter == null) {
                      channelAdapter = ChannelAdapter(channels) { channel ->
                          val index = channels.indexOfFirst { it.url == channel.url }
                          if (index != -1) {
                              currentChannelIndex = index
                              playChannel(currentChannelIndex)
                          }
                          hideChannelList()
                      }
                      binding.channelListView.layoutManager = LinearLayoutManager(this)
                      binding.channelListView.adapter = channelAdapter
                  }
                  binding.channelListView.visibility = View.VISIBLE
                  isChannelListVisible = true
                  binding.channelListView.scrollToPosition(currentChannelIndex)
              }
          
              private fun hideChannelList() {
                  binding.channelListView.visibility = View.GONE
                  isChannelListVisible = false
              }
          
              private fun playChannel(index: Int) {
                  if (index !in channels.indices) return
                  currentChannelIndex = index
                  val channel = channels[currentChannelIndex]
                  player.setMediaItem(MediaItem.Builder().setUri(channel.url).setMimeType("application/x-mpegURL").build())
                  player.prepare()
                  player.play()
                  showToast(channel.name)
              }
          
              private fun showToast(msg: String) {
                  binding.toastChannelName.text = msg
                  binding.toastChannelName.visibility = View.VISIBLE
                  binding.toastChannelName.postDelayed({ binding.toastChannelName.visibility = View.GONE }, 1500)
              }
          
              private fun nextChannel() {
                  if (channels.isNotEmpty()) playChannel((currentChannelIndex + 1) % channels.size)
              }
          
              private fun previousChannel() {
                  if (channels.isNotEmpty()) playChannel((currentChannelIndex - 1 + channels.size) % channels.size)
              }
          
              private fun loadPlaylist() {
                  lifecycleScope.launch {
                      try {
                          val fetched = withContext(Dispatchers.IO) { PlaylistParser.fetchPlaylist(BuildConfig.PLAYLIST_URL) }
                          channels = fetched
                          if (channels.isNotEmpty()) playChannel(0) else showToast("无频道")
                      } catch (e: Exception) {
                          showToast("加载失败: ${e.message}")
                      }
                  }
              }
          
              override fun onDestroy() {
                  super.onDestroy()
                  player.release()
              }
          }
          EOF

      - name: Write Channel.kt
        run: |
          cat > android/app/src/main/java/com/iptv/player/Channel.kt << 'EOF'
          package com.iptv.player
          data class Channel(val name: String, val url: String)
          EOF

      - name: Write ChannelAdapter.kt
        run: |
          cat > android/app/src/main/java/com/iptv/player/ChannelAdapter.kt << 'EOF'
          package com.iptv.player
          import android.view.LayoutInflater
          import android.view.ViewGroup
          import androidx.recyclerview.widget.RecyclerView
          import com.iptv.player.databinding.ItemChannelBinding
          
          class ChannelAdapter(
              private val channels: List<Channel>,
              private val onItemClick: (Channel) -> Unit
          ) : RecyclerView.Adapter<ChannelAdapter.ViewHolder>() {
              override fun onCreateViewHolder(parent: ViewGroup, viewType: Int): ViewHolder {
                  val binding = ItemChannelBinding.inflate(LayoutInflater.from(parent.context), parent, false)
                  return ViewHolder(binding)
              }
              override fun onBindViewHolder(holder: ViewHolder, position: Int) {
                  val ch = channels[position]
                  holder.binding.channelName.text = ch.name
                  holder.binding.root.setOnClickListener { onItemClick(ch) }
              }
              override fun getItemCount() = channels.size
              inner class ViewHolder(val binding: ItemChannelBinding) : RecyclerView.ViewHolder(binding.root)
          }
          EOF

      - name: Write PlaylistParser.kt
        run: |
          cat > android/app/src/main/java/com/iptv/player/PlaylistParser.kt << 'EOF'
          package com.iptv.player
          import okhttp3.OkHttpClient
          import okhttp3.Request
          import java.util.concurrent.TimeUnit
          
          object PlaylistParser {
              private val client = OkHttpClient.Builder()
                  .connectTimeout(15, TimeUnit.SECONDS)
                  .readTimeout(15, TimeUnit.SECONDS)
                  .build()
          
              suspend fun fetchPlaylist(url: String): List<Channel> {
                  val response = client.newCall(Request.Builder().url(url).build()).execute()
                  if (!response.isSuccessful) throw Exception("HTTP ${response.code}")
                  val content = response.body?.string() ?: throw Exception("Empty body")
                  return if (url.endsWith(".m3u") || url.endsWith(".m3u8")) parseM3u(content) else parseTxt(content)
              }
          
              private fun parseM3u(content: String): List<Channel> {
                  val list = mutableListOf<Channel>()
                  var currentName = ""
                  content.lines().forEach { line ->
                      if (line.startsWith("#EXTINF")) {
                          currentName = Regex(",(.+)$").find(line)?.groupValues?.get(1)?.trim() ?: ""
                      } else if (line.trim().startsWith("http") && currentName.isNotBlank()) {
                          list.add(Channel(currentName, line.trim()))
                          currentName = ""
                      }
                  }
                  return list
              }
          
              private fun parseTxt(content: String): List<Channel> {
                  val list = mutableListOf<Channel>()
                  var currentName = ""
                  content.lines().forEach { line ->
                      val trimmed = line.trim()
                      when {
                          trimmed.startsWith("#") && !trimmed.startsWith("#EXT") -> currentName = trimmed.removePrefix("#").trim()
                          trimmed.startsWith("http") -> {
                              val name = if (currentName.isBlank()) "频道" else currentName
                              list.add(Channel(name, trimmed))
                              currentName = ""
                          }
                      }
                  }
                  return list
              }
          }
          EOF

      - name: Write activity_main.xml
        run: |
          cat > android/app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
              <com.google.android.exoplayer2.ui.PlayerView
                  android:id="@+id/playerView"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  app:use_controller="false"
                  app:resize_mode="fit" />
              <androidx.recyclerview.widget.RecyclerView
                  android:id="@+id/channelListView"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:background="#CC000000"
                  android:visibility="gone"
                  android:paddingTop="60dp"
                  android:paddingBottom="60dp"
                  android:clipToPadding="false" />
              <TextView
                  android:id="@+id/toastChannelName"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_gravity="center"
                  android:background="#DD000000"
                  android:padding="12dp"
                  android:textColor="#FFFFFF"
                  android:textSize="24sp"
                  android:visibility="gone" />
          </FrameLayout>
          EOF

      - name: Write item_channel.xml
        run: |
          cat > android/app/src/main/res/layout/item_channel.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="wrap_content"
              android:orientation="horizontal"
              android:padding="16dp"
              android:background="?attr/selectableItemBackground">
              <TextView
                  android:id="@+id/channel_name"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:textColor="#FFFFFF"
                  android:textSize="18sp"
                  android:maxLines="1"
                  android:ellipsize="end" />
          </LinearLayout>
          EOF

      - name: Write colors.xml
        run: |
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="purple_200">#FFBB86FC</color>
              <color name="purple_500">#FF6200EE</color>
              <color name="purple_700">#FF3700B3</color>
              <color name="teal_200">#FF03DAC5</color>
              <color name="teal_700">#FF018786</color>
              <color name="black">#FF000000</color>
              <color name="white">#FFFFFFFF</color>
          </resources>
          EOF

      - name: Write strings.xml
        run: |
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">IPTV Player</string>
          </resources>
          EOF

      - name: Write themes.xml
        run: |
          cat > android/app/src/main/res/values/themes.xml << 'EOF'
          <resources xmlns:tools="http://schemas.android.com/tools">
              <style name="Theme.IPTVPlayer" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowContentOverlay">@null</item>
                  <item name="android:windowBackground">@android:color/black</item>
              </style>
          </resources>
          EOF

      - name: Write ic_launcher.xml (vector drawable)
        run: |
          cat > android/app/src/main/res/drawable/ic_launcher.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#FF6200EE"
                  android:pathData="M54,12 L96,30 L96,78 L54,96 L12,78 L12,30 Z" />
              <path
                  android:fillColor="#FFFFFFFF"
                  android:pathData="M54,24 L84,36 L84,72 L54,84 L24,72 L24,36 Z" />
              <path
                  android:fillColor="#FF6200EE"
                  android:pathData="M54,36 L72,45 L72,63 L54,72 L36,63 L36,45 Z" />
          </vector>
          EOF

      - name: Generate gradlew script
        run: |
          cd android
          # 创建简易 gradlew (如果wrapper jar已存在，gradle会自动生成)
          cat > gradlew << 'EOF'
          #!/bin/sh
          exec gradle "$@"
          EOF
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd android
          # 使用本地gradle wrapper (但我们已经下载了jar，需要用gradle命令)
          # 由于我们已有 gradle-wrapper.jar 和 properties，可以执行 gradlew
          # 但为了保险，直接调用系统gradle
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Player-Debug
          path: android/app/build/outputs/apk/debug/*.apk
