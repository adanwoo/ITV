name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write   # 允许创建 Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Install Gradle
        run: |
          if ! command -v gradle &> /dev/null; then
            wget -q https://services.gradle.org/distributions/gradle-8.3-bin.zip
            unzip -q gradle-8.3-bin.zip
            echo "$(pwd)/gradle-8.3/bin" >> $GITHUB_PATH
          fi

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Get GitHub Pages URL
        id: pages-url
        run: |
          REPO_NAME=${GITHUB_REPOSITORY#*/}
          OWNER=${GITHUB_REPOSITORY_OWNER}
          BASE_URL="https://$OWNER.github.io/$REPO_NAME/"
          echo "base_url=$BASE_URL" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        run: gradle assembleDebug -PbaseUrl=${{ steps.pages-url.outputs.base_url }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Get version name
        id: version
        run: echo "tag=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-${{ steps.version.outputs.tag }}
          name: IPTV Player APK ${{ steps.version.outputs.tag }}
          files: app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
